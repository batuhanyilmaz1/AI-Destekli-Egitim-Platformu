name: fuarprojesi
description: "LUMINA QUIZ - AI Destekli Eğitim Uygulaması"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  sqflite: ^2.3.3
  path: ^1.9.0
  lottie: ^3.1.2
  device_info_plus: ^10.1.0
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  share_plus: ^10.0.0
  flutter_markdown: ^0.7.7+1
  flutter_dotenv: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "new_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "new_icon.png"

flutter:
  uses-material-design: true
  assets:
    - .env
